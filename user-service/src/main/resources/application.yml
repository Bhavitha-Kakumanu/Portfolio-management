spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8081

jwt:
  # CHANGE THIS in production — use a long random string, inject via env var
  secret: "robinhood-super-secret-jwt-key-change-in-production-must-be-32-chars-min"
  expiration-ms: 86400000   # 24 hours in milliseconds

logging:
  level:
    com.robinhood: DEBUG
    org.springframework.security: DEBUG
