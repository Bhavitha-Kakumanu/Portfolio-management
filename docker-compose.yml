version: '3.9'

# This file spins up all infrastructure needed for local development.
# Run: docker-compose up -d
# Stop: docker-compose down

services:

  # ── Databases ──────────────────────────────────────────────────────────────

  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data

  postgres-trading:
    image: postgres:16-alpine
    container_name: postgres-trading
    environment:
      POSTGRES_DB: tradingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_trading_data:/var/lib/postgresql/data

  postgres-portfolio:
    image: postgres:16-alpine
    container_name: postgres-portfolio
    environment:
      POSTGRES_DB: portfoliodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_portfolio_data:/var/lib/postgresql/data

  # ── Cache ──────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ── Messaging ──────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Kafka UI — browse topics and messages at http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  postgres_users_data:
  postgres_trading_data:
  postgres_portfolio_data:
