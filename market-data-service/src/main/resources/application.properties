spring.application.name=market-data-service
server.port=8083

# CORS Origin Config
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Actuator Config
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Service Metadata
management.info.env.enabled=true
info.app.name=Market Data Service
info.app.description=Provides stock search, quotes, history and market movers
info.app.version=0.0.1